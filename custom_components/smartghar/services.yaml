refill_marker:
  name: Log a tank refill
  description: >
    Manually mark that a tank was refilled — e.g., when a tanker delivers water
    and you want a record. Fires an `smartghar_refill_marker` event with
    metadata you can listen for in automations (e.g., to log to a notebook,
    update a cost spreadsheet, send a confirmation push). The integration's
    auto-detected `fill_complete` events handle obvious refills automatically;
    use this service for situations where the auto-detection missed (very
    fast fills under one coordinator tick) or where you want to record extra
    metadata like cost or source.
  fields:
    tank:
      name: Tank
      description: The tank that was refilled.
      required: false
      selector:
        entity:
          integration: smartghar
          device_class: water
    volume_l:
      name: Volume (litres)
      description: How much water was added.
      example: 5000
      required: false
      selector:
        number:
          min: 1
          max: 100000
          step: 1
          unit_of_measurement: L
    source:
      name: Source
      description: Where the water came from.
      example: tanker
      required: false
      selector:
        select:
          options:
            - tanker
            - municipal
            - well
            - rainwater
            - other
    cost:
      name: Cost
      description: Optional amount paid for this fill (in your local currency).
      example: 450
      required: false
      selector:
        number:
          min: 0
          max: 100000
          step: 1
    note:
      name: Note
      description: Free-form note (vendor name, receipt number, etc.).
      example: Sharma Tankers, receipt 4521
      required: false
      selector:
        text:

reset_consumption:
  name: Reset water consumption total
  description: >
    Zero a tank's cumulative water-consumption total. Use this to clear a
    poisoned total — e.g. phantom drains that accumulated from hub restarts on
    firmware before the restart guard landed. The baseline is re-seeded from the
    current level, so the reset itself isn't counted as usage.
  target:
    entity:
      integration: smartghar
      device_class: water
  fields: {}

test_buzzer:
  name: Test buzzer sound
  description: >
    Preview a buzzer alert pattern on a SmartGhar hub (rx-v2.8.4+).
    Useful for confirming the buzzer is wired correctly, checking the
    volume profile sounds right, or demonstrating which alert
    corresponds to which condition. Bypasses master_enable + quiet
    hours on the firmware side — it's a preview, not a real alert.
  fields:
    entity_id:
      name: Hub or tank entity
      description: >
        Any entity belonging to the SmartGhar hub whose buzzer you
        want to test. The integration resolves the hub via the
        device registry. Easiest pick: the hub's own
        `switch.<hub>_buzzer_enabled` or any tank-level sensor.
      required: true
      selector:
        entity:
          integration: smartghar
    event:
      name: Alert pattern
      description: Which alert pattern to play (matches buzzer_event_t in firmware).
      required: true
      example: 4
      selector:
        select:
          mode: dropdown
          options:
            - label: Test button (short double-beep)
              value: '4'
            - label: Critical low (<5%)
              value: '1'
            - label: Overflow (>95%)
              value: '2'
            - label: Sensor offline
              value: '3'
            - label: Pair success
              value: '6'
            - label: OTA success
              value: '7'
            - label: OTA failure
              value: '8'
    profile:
      name: Volume profile (override)
      description: >
        Optional — preview a different loudness without changing the
        hub's current Volume setting. Leave empty to use the
        configured profile.
      required: false
      selector:
        select:
          mode: dropdown
          options:
            - label: Quiet
              value: '0'
            - label: Standard
              value: '1'
            - label: Loud
              value: '2'
